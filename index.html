<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrelloToPDF Web App</title>
    <!-- Argentina Aesthetics Styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Hero Section -->
        <header class="hero">
            <div class="sun-icon">☀️</div>
            <h1>TrelloToPDF</h1>
            <p>FIFA Argentina Edition 🇦🇷</p>
        </header>

        <main>
            <!-- 步驟一：上傳 JSON -->
            <section id="upload-section" class="card active">
                <h2>1. 上傳 Trello JSON</h2>
                <div id="drop-zone" class="drop-zone">
                    <span class="icon">📁</span>
                    <p>拖曳 Trello JSON 檔案至此</p>
                    <p class="subtitle">長按拖曳檔案，或直接點擊選擇檔案</p>
                    <input type="file" id="file-input" accept=".json" hidden>
                </div>
            </section>

            <!-- 步驟二：選擇列表 -->
            <section id="selection-section" class="card hidden">
                <h2>2. 選擇要匯出的列表</h2>
                <h3 id="board-name-display" class="board-name"></h3>
                
                <div class="controls">
                    <button id="btn-select-all" class="btn-secondary">全選</button>
                    <button id="btn-deselect-all" class="btn-secondary">全不選</button>
                </div>

                <div id="lists-container" class="lists-container">
                    <!-- Javascript 將動態產生多個 Checkbox 在這裡 -->
                </div>

                <div class="actions">
                    <button id="btn-generate" class="btn-primary">產生並預覽 PDF</button>
                    <button id="btn-reset" class="btn-text">返回重新上傳</button>
                </div>
            </section>
        </main>
    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
